<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ارشیا کتاب</title>

    <style>
        * {
            box-sizing: border-box;
            font-family: system-ui, sans-serif;
        }

        body {
            margin: 0;
            background: #f3f4f6;
            color: #222;
        }

        /* navbar */
        .navbar {
            background: #0f172a;
            color: white;
            padding: 14px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .navbar ul {
            list-style: none;
            display: flex;
            gap: 20px;
            margin: 0;
            padding: 0;
        }

        .navbar a {
            color: white;
            text-decoration: none;
            font-size: 14px;
        }

        .logo {
            font-weight: bold;
        }

        /* main */
        .container {
            max-width: 1100px;
            margin: 60px auto;
            padding: 20px;
        }

        .book {
            background: white;
            border-radius: 18px;
            padding: 40px;
            display: flex;
            gap: 50px;
            align-items: center;
            box-shadow: 0 20px 40px rgba(0, 0, 0, .1);
        }

        .book img {
            width: 260px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, .25);
        }

        .info {
            flex: 1;
        }

        .info h1 {
            font-size: 32px;
            margin: 0 0 10px;
        }

        .author {
            color: #666;
            margin-bottom: 10px;
        }

        .price {
            font-size: 22px;
            font-weight: bold;
            margin: 15px 0;
        }

        .desc {
            color: #555;
            line-height: 1.8;
            margin-bottom: 25px;
        }

        button {
            padding: 14px 30px;
            border: none;
            border-radius: 10px;
            background: #4f46e5;
            color: white;
            font-size: 15px;
            cursor: pointer;
            transition: .3s;
        }

        button:hover {
            background: #3730a3;
        }

        /* responsive */
        @media (max-width: 900px) {
            .book {
                flex-direction: column;
                text-align: center;
            }

            .book img {
                width: 220px;
            }
        }

        @media (max-width: 500px) {
            .info h1 {
                font-size: 26px;
            }
        }
    </style>
</head>
<body>

<header>

    <div class="navbar">
        <div class="logo">ارشیا کتاب</div>
        <ul>
            <li><a href="http://localhost:8081">خانه</a></li>
            <li><a href="http://localhost:8081/bookList">کتاب‌ها</a></li>
            <li><a href="#">درباره ما</a></li>
            <li><a href="#">تماس با ما</a></li>
        </ul>
    </div>

</header>

<div class="container">

    <div class="book">
        <img src="" id="image">

        <div class="info">
            <h1 id="bookName"></h1>
            <div class="author"><span>نویسنده : </span> <span id="author"></span></div>
            <div class="price"><span id="price"></span> <span>تومان</span></div>

            <div class="desc" id="description">
                کتابی جذاب و پرماجرا درباره دنیای جادوگری که داستان رشد،
                شجاعت و مبارزه با تاریکی را روایت می‌کند و یکی از محبوب‌ترین
                مجموعه‌های جهان است.
            </div>

            <button>افزودن به سبد خرید</button>
        </div>
    </div>

</div>

<script>
    const params = new URLSearchParams(window.location.search)
    const bookId = params.get("id");

    function getBookDetail() {
        fetch("http://localhost:8081/books/" + bookId)
            .then(res => res.json())
            .then(book => {
                document.getElementById("image").src = book.imageAddress;
                document.getElementById("bookName").innerText = book.title;
                document.getElementById("price").innerText = book.price;
                document.getElementById("description").innerText = book.description;
                document.getElementById("author").innerText = book.author;
            })
    }

    getBookDetail();
</script>

</body>
</html>
