<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>ارشیا کتاب</title>

    <style>
        :root {
            --primary: #4b3f2f;
            --secondary: #8d6e63;
            --bg: #f7f4ef;
            --text: #333;
            --white: #fff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Tahoma, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            line-height: 1.8;
        }

        a {
            text-decoration: none;
            color: inherit;
        }

        .navbar {
            background: #0f172a;
            color: white;
            padding: 14px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .navbar ul {
            list-style: none;
            display: flex;
            gap: 20px;
            margin: 0;
            padding: 0;
        }

        .navbar a {
            color: white;
            text-decoration: none;
            font-size: 14px;
        }

        .logo {
            font-weight: bold;
        }

        .hero h1 {
            font-size: 32px;
            margin-bottom: 15px;
        }

        .hero p {
            max-width: 600px;
            margin: auto;
            margin-bottom: 25px;
        }

        .books h2 {
            text-align: center;
            margin-bottom: 40px;
            color: var(--primary);
        }

        .book-card img {
            width: 100%;
            height: 220px;
            object-fit: cover;
            border-radius: 6px;
            margin-bottom: 15px;
        }

        .book-card h3 {
            font-size: 16px;
            margin-bottom: 8px;
        }

        .btn {
            padding: 14px 30px;
            margin: 10px;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            cursor: pointer;
            transition: .3s;
            color: white;
        }

        .btn-delete {
            background: #ff1111;
        }

        .btn-edit {
            background: #46e556;
        }

        .btn:hover {
            background: #3730a3;
        }

        @media (max-width: 760px) {
            header {
                flex-direction: column;
                gap: 10px;
            }

            nav ul {
                flex-wrap: wrap;
                justify-content: center;
            }

            .hero h1 {
                font-size: 26px;
            }
        }

        * {
            box-sizing: border-box;
            font-family: system-ui, sans-serif;
        }

        .card {
            background: #fff;
            width: 100%;
            max-width: 380px;
            padding: 32px 26px;
            border-radius: 14px;
            box-shadow: 0 12px 28px rgba(0, 0, 0, .25);
            text-align: center;
            margin: 50px auto;
        }

        .card h2 {
            margin-bottom: 22px;
            font-size: 22px;
        }

        .input-box {
            margin-bottom: 14px;
        }

        .input-box input {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #ddd;
            font-size: 14px;
            outline: none;
        }

        .input-box input:focus {
            border-color: #4c7dff;
        }

        .login-link a {
            color: #4c7dff;
            text-decoration: none;
        }

        @media (max-width: 480px) {
            .card {
                padding: 26px 20px;
            }

            .card h2 {
                font-size: 20px;
            }

            .input-box input {
                padding: 11px;
            }
        }

        @media (min-width: 900px) {
            .card {
                max-width: 420px;
            }
        }
    </style>

</head>
<body>

<header>

    <div class="navbar">
        <div class="logo">ارشیا کتاب</div>
        <ul>
            <li><a href="http://localhost:8081">خانه</a></li>
            <li><a href="http://localhost:8081/bookList">کتاب‌ها</a></li>
            <li><a href="#">درباره ما</a></li>
            <li><a href="#">تماس با ما</a></li>
        </ul>
    </div>

</header>

<div class="card">
    <h2>افزودن / ویرایش کتاب</h2>

    <form method="post" action="http://localhost:8081/book/save">
        <div class="input-box">
            <input type="text" placeholder="نام کتاب" name="title" required>
        </div>

        <div class="input-box">
            <input type="text" placeholder="نویسنده کتاب" name="author" required>
        </div>

        <div class="input-box">
            <input type="text" placeholder="قیمت کتاب (تومان)" name="price" required>
        </div>

        <div class="input-box">
            <input type="text" placeholder="آدرس عکس کتاب" name="imageAddress" required>
        </div>

        <div class="input-box">
            <input type="text" placeholder="توضیحات کتاب" name="description" required>
        </div>

        <div>

            <button class="btn btn-edit" type="submit">ذخیره کتاب</button>
            <a class="btn btn-delete" href="http://localhost:8081/admin/books">انصراف</a>

        </div>

    </form>
</div>

</body>
</html>
