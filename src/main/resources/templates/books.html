<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>ارشیا کتاب</title>

    <style>

        :root {
            --primary: #4b3f2f;
            --secondary: #8d6e63;
            --bg: #f7f4ef;
            --text: #333;
            --white: #fff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Tahoma, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            line-height: 1.8;
        }

        a {
            text-decoration: none;
            color: inherit;
        }

        .navbar {
            background: #0f172a;
            color: white;
            padding: 14px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .navbar ul {
            list-style: none;
            display: flex;
            gap: 20px;
            margin: 0;
            padding: 0;
        }

        .navbar a {
            color: white;
            text-decoration: none;
            font-size: 14px;
        }

        .logo {
            font-weight: bold;
        }

        .book-title {
            color: #0d0b2a;
        }

        .books-page {
            text-align: center;
        }

        .hero h1 {
            font-size: 32px;
            margin-bottom: 15px;
        }

        .hero p {
            max-width: 600px;
            margin: auto;
            margin-bottom: 25px;
        }

        .books h2 {
            text-align: center;
            margin-bottom: 40px;
            color: var(--primary);
        }

        .book-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 25px;
        }

        .book-card {
            background-color: var(--white);
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.08);
            text-align: center;
        }

        .book-card img {
            width: 100%;
            height: 220px;
            object-fit: cover;
            border-radius: 6px;
            margin-bottom: 15px;
        }

        .book-card h3 {
            font-size: 16px;
            margin-bottom: 8px;
        }

        .price {
            color: var(--secondary);
            font-weight: bold;
        }

        footer {
            background: #0f172a;
            color: white;
            text-align: center;
            padding: 20px;
            margin-top: 40px;
            font-size: 14px;
        }

        @media (max-width: 760px) {
            header {
                flex-direction: column;
                gap: 10px;
            }

            nav ul {
                flex-wrap: wrap;
                justify-content: center;
            }

            .hero h1 {
                font-size: 26px;
            }
        }

        .book-card .author {
            font-size: 14px;
            margin-bottom: 10px;
            color: #777;
        }

        .book-card .price {
            font-weight: bold;
            color: #8d6e63;
            font-size: 15px;
        }
    </style>

</head>
<body>

<header>

    <div class="navbar">
        <div class="logo">ارشیا کتاب</div>
        <ul>
            <li><a href="http://localhost:8081">خانه</a></li>
            <li><a href="http://localhost:8081/bookList">کتاب‌ها</a></li>
            <li><a href="#">درباره ما</a></li>
            <li><a href="#">تماس با ما</a></li>
        </ul>
    </div>

</header>

<main class="books-page">
    <h1 class="book-title">همه کتاب ها</h1>

    <section class="book-grid" id="bookSection">

    </section>
</main>
<footer>
    2026 ارشیا کتاب - تمام حقوق محفوظ است
</footer>

<script>
    function loadProducts() {
        fetch("http://localhost:8081/books")
            .then(res => res.json())
            .then(res => {
                for (let i = 0; i < res.length; i++) {
                    convertJsonToCart(res[i]);
                }
            })
    }

    function convertJsonToCart(book) {
        let cart = `<a href="http://localhost:8081/book?id=${book.id}" class="book-card">
            <img src="${book.imageAddress}" alt="">
            <h3>${book.title}</h3>
            <p class="author">${book.author}</p>
            <div class="price">${book.price} تومان</div>
        </a>`;

        document.getElementById("bookSection").innerHTML += cart;
    }

    loadProducts();
</script>

</body>
</html>
